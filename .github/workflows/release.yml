name: Release Mimic Hub
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-windows:
    permissions:
      contents: write 
    runs-on: windows-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20 

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Frontend)
        run: npm install


      - name: Prepare Driver for Bundling (wintun.dll)
        shell: powershell
        run: |
          $dll = Get-ChildItem -Path . -Recurse -Filter "wintun.dll" | Select-Object -First 1
          
          if ($dll) {
              Write-Host "✅ Driver encontrado en: $($dll.FullName)"
              Copy-Item -Path $dll.FullName -Destination src-tauri\wintun.dll -Force
              New-Item -ItemType Directory -Force -Path src-tauri\target\debug
              Copy-Item -Path $dll.FullName -Destination src-tauri\target\debug\wintun.dll -Force
              
              Write-Host "✨ LISTO: Driver colocado en la pista de despegue."
          } else {
              Write-Error "❌ ERROR FATAL: No encuentro wintun.dll en el repositorio."
              exit 1
          }


      - name: Build, Sign and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Mimic Hub ${{ github.ref_name }}'
          releaseBody: 'Actualización automática de arquitectura de red P2P.'
          releaseDraft: false
          prerelease: false